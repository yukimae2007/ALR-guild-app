<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Guild Manager</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ホーム画面 -->
  <div id="home" class="home-screen">
    <div class="home-content">
      <img src="guild_emblem.png" class="guild-emblem">
      <h1 class="home-title">Guild Management</h1>

      <div class="home-menu">
        <button class="menu-button" onclick="showSection('register')">メンバー登録</button>
        <button class="menu-button" onclick="showSection('party')">パーティ編成</button>
      </div>
    </div>
  </div>

  <!-- メンバー登録画面 -->
  <div id="register" style="display:none;">
    <h1 class="guild-title">ギルドメンバー登録</h1>

    <div class="panel register-panel">
      <label>名前</label>
      <input type="text" id="name">

      <label>戦闘力</label>
      <input type="number" id="power">

      <label>ランク</label>
      <input type="number" id="rank">

      <label>部隊</label>
      <input type="text" id="team">

      <button class="button big-button" onclick="addMember()">登録</button>
    </div>

    <h2 class="guild-subtitle">登録済みメンバー</h2>
    <div id="memberList" class="member-list"></div>
  </div>

  <!-- パーティ編成画面 -->
  <div id="party" style="display:none;">
    <h1 class="guild-title">パーティ自動編成</h1>

    <div class="panel">
      <h3>戦闘力範囲設定</h3>

      <div class="party-range">Party 1:
        <input type="number" id="p1_min" placeholder="最小">
        <input type="number" id="p1_max" placeholder="最大">
      </div>

      <div class="party-range">Party 2:
        <input type="number" id="p2_min" placeholder="最小">
        <input type="number" id="p2_max" placeholder="最大">
      </div>

      <div class="party-range">Party 3:
        <input type="number" id="p3_min" placeholder="最小">
        <input type="number" id="p3_max" placeholder="最大">
      </div>

      <div class="party-range">Party 4:
        <input type="number" id="p4_min" placeholder="最小">
        <input type="number" id="p4_max" placeholder="最大">
      </div>

      <div class="party-range">Party 5:
        <input type="number" id="p5_min" placeholder="最小">
        <input type="number" id="p5_max" placeholder="最大">
      </div>

      <div class="party-range">Party 6:
        <input type="number" id="p6_min" placeholder="最小">
        <input type="number" id="p6_max" placeholder="最大">
      </div>

      <button class="button big-button" onclick="createGroups()">パーティ編成</button>
    </div>

    <div id="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
